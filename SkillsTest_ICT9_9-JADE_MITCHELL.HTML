<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #e9f0f7;
            font-family: Arial;
        }

        .box {
            width: 350px;
            margin: auto;
            margin-top: 100px;
            padding: 20px;
            background: white;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Login</h1>
    <h5 class="text-muted">Student Authentication</h5>

    <p>Enter your username and password</p>

    <input type="text" id="user" class="form-control mt-3" placeholder="Username">
    <input type="password" id="pass" class="form-control mt-2" placeholder="Password">

    <div class="form-check form-switch mt-3 text-start">
        <input class="form-check-input" type="checkbox" id="keepLoggedIn">
        <label class="form-check-label" for="keepLoggedIn">Keep me logged in</label>
    </div>

    <button class="btn btn-primary mt-3 w-100" onclick="login()">Login</button>

    <p id="result" class="mt-3"></p>

</div>

<script>
let attempts = 3;

window.onload = function() {
    if (localStorage.getItem("loggedIn") === "true") {
        window.location.href = "Notebook.html";
    }
};

function login() {
    var username = document.getElementById("user").value;
    var password = document.getElementById("pass").value;
    var keep = document.getElementById("keepLoggedIn").checked;

    if (attempts <= 0) {
        document.getElementById("result").innerHTML = "Account locked. Too many attempts.";
        return;
    }

    if (username === "Darvine" && password === "1234") {
        document.getElementById("result").innerHTML = "Login Successful!";
        alert("Welcome!");

        if (keep) {
            localStorage.setItem("loggedIn", "true");
        } else {
            localStorage.removeItem("loggedIn");
        }

        window.location.href = "Notebook.html";
    } else {
        attempts--;
        document.getElementById("result").innerHTML =
            "Wrong username or password! Attempts left: " + attempts;

        alert("Incorrect login");

        if (attempts === 0) {
            document.getElementById("result").innerHTML =
                "Account locked. Refresh page to try again.";
        }
    }
}
</script>

</body>
</html>
